<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack Pro — Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <div class="start-div" id="start-div">
    <div class="start-box">
      <h2>Welcome to FinTrack Pro</h2>
      <p>Enter your name to start tracking your finances.</p>
      <input type="text" id="user-name" placeholder="Your name" autocomplete="off" />
      <button id="start-btn">Continue</button>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <i class="ri-stack-line"></i>
        <div>
          <h1>FinTrack Pro</h1>
          <p>Enterprise Finance</p>
        </div>
      </div>
      <nav class="nav">
        <a href="index.html" class="nav-link"><i class="ri-grid-fill"></i> Dashboard</a>
        <a href="settings.html" class="nav-link active"><i class="ri-settings-3-line"></i> Settings</a>
      </nav>
      <button class="add-transaction-btn" id="open-modal-btn">
        <i class="ri-add-line"></i> Add Transaction
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <span class="user-name" id="user-name-display"></span>
      </header>

      <section class="content">
        <div class="page-heading">
          <h2>Settings</h2>
          <p>Manage your account profile and app formatting.</p>
        </div>

        <div class="card">
          <h3>Profile Details</h3>
          <div class="form-grid">
            <label>Full Name
              <input type="text" id="settings-name" placeholder="Your name" />
            </label>
            <label>Primary Currency
              <select id="settings-currency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
                <option value="INR">INR (₹)</option>
                <option value="JPY">JPY (¥)</option>
              </select>
            </label>
          </div>
          <button class="save-btn" id="save-settings-btn">Save Changes</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="transaction-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Add Transaction</h3>
        <button class="close-modal" id="close-modal-btn"><i class="ri-close-line"></i></button>
      </div>
      <form id="transaction-form">
        <label>Description
          <input type="text" id="t-description" placeholder="e.g. Grocery shopping" required />
        </label>
        <div class="form-row">
          <label>Amount
            <input type="number" id="t-amount" step="0.01" min="0.01" placeholder="0.00" required />
          </label>
          <label>Type
            <select id="t-type">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>Category
            <input type="text" id="t-category" placeholder="e.g. Salary, Food" required />
          </label>
          <label>Date
            <input type="date" id="t-date" required />
          </label>
        </div>
        <button type="submit" class="submit-btn">Add Transaction</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
